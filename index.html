
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | مغامرات سندباد HD</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0b0f19;
            --card: #161e2e;
            --text: #ffffff;
            --accent: #ff9800;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 40px 0;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        header h1 { margin: 0; font-size: 2.2rem; font-weight: 900; }
        header p { margin: 10px 0 0; opacity: 0.9; }

        .main-container {
            max-width: 900px;
            width: 95%;
            margin: 30px auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text);
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
        }

        .episodes-container {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 12px;
        }

        .ep-btn {
            background: #252f44;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 0;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: 0.3s ease;
            display: block;
        }

        .ep-btn:hover {
            background: var(--primary);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        footer {
            margin: 40px 0;
            opacity: 0.5;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>🚢 صدى الطفولة</h1>
    <p>مغامرات سندباد بجودة HD</p>
</header>

<div class="main-container">
    <div class="section-header">قائمة الحلقات</div>
    <div class="episodes-container">
        <div class="episodes-grid" id="buttonsGrid"></div>
    </div>
</div>

<footer>
    <p>جميع الحقوق محفوظة - صدى الطفولة &copy; 2026</p>
</footer>

<script>
    // مصفوفة الروابط - يمكنك إعادة ترتيب أي سطر إذا كانت الحلقة لا تطابق الترتيب

        "https://cartoony.net/watch/121/998", "https://cartoony.net/watch/121/999", "https://cartoony.net/watch/121/1000",

        "https://cartoony.net/watch/121/1004", "https://cartoony.net/watch/121/1005", "https://cartoony.net/watch/121/1006",
        "https://cartoony.net/watch/121/1007", "https://cartoony.net/watch/121/1008", "https://cartoony.net/watch/121/1009",

    episodeLinks.forEach((link, index) => {

</script>

</body>
</html>
